name: agnes_router_mov
version: 1.1.0
description: >
  Agnes AI video generation for Hermes Agent — mov variant.
  Generates videos safely into a configurable workspace directory.
  Tool: generate_video_via_mov01 (text-to-video, image-to-video, keyframe).
provides_tools:
  - generate_video_via_mov01
requires_env:
  - name: AGNES_API_KEY
    description: Agnes AI API key for video generation
    secret: true
configurable:
  workspace_root:
    description: Base directory for generated media
    default: ~/workspace
  video_endpoint:
    description: Video generation API endpoint
    default: https://apihub.agnes-ai.com/v1/videos
  video_model:
    description: Default video generation model
    default: agnes-video-v2.0
  video_timeout:
    description: Request timeout for video submission (seconds)
    default: 300
    min: 60
    max: 900
  download_timeout:
    description: Timeout for downloading generated media (seconds)
    default: 300
    min: 30
    max: 1800
  max_retries:
    description: Max retry attempts for transient errors
    default: 2
  retry_delay:
    description: Delay between retries (seconds)
    default: 3.0